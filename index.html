<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>fueltrack</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FuelTrack" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      /* Pre-React splash — rendered by the browser the instant the
         HTML parses, so iOS/Android Capacitor users never see a blank
         white WKWebView while the 1.2 MB JS bundle loads. React takes
         over #root on mount and blows this block away for free. */
      html, body { margin: 0; padding: 0; height: 100%; background: #0f172a; }
      #ft-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px;
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        animation: ft-fadein 0.2s ease-out;
      }
      #ft-splash .logo {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: -0.02em;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #ft-splash .logo-mark { font-size: 48px; }
      #ft-splash .tag {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #ft-splash .dot-loader {
        margin-top: 8px;
        display: flex; gap: 6px;
      }
      #ft-splash .dot-loader span {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(255,255,255,0.8);
        animation: ft-bounce 1s infinite ease-in-out both;
      }
      #ft-splash .dot-loader span:nth-child(1) { animation-delay: -0.32s; }
      #ft-splash .dot-loader span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes ft-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.6; }
        40% { transform: scale(1); opacity: 1; }
      }
      @keyframes ft-fadein { from { opacity: 0; } to { opacity: 1; } }
      /* Light mode fallback so the browser / PWA respects system pref */
      @media (prefers-color-scheme: light) {
        html, body { background: #f3f4f6; }
        #ft-splash {
          background: linear-gradient(180deg, #ffffff 0%, #f3f4f6 100%);
          color: #0f172a;
        }
        #ft-splash .tag { color: rgba(15,23,42,0.6); }
        #ft-splash .dot-loader span { background: rgba(15,23,42,0.8); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="ft-splash" aria-hidden="true">
        <div class="logo"><span class="logo-mark">🍔</span>FuelTrack</div>
        <div class="tag">Plan · Track · Achieve</div>
        <div class="dot-loader"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
